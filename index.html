<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>EL CLIMA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=PT+Mono&family=Unkempt:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
     <header>
        <form class="fo" id = "search-form">
            <input type="search" placeholder="Enter a city:" class="in-search" id ="search-form-input" required  />
            <input type="submit" value="search" class="in-button" />
        </form>
    </header>
    <main>
     <div class="weather-app-data">

      <div>
    
        <h1 class="weather-app-city" id = "city"></h1>
       <p class="weather-app-details">
         <span id="time"></span>, <span id="description"></span>
         <br />
          humidity: <strong id="humidity"></strong>, wind: <strong id="wind-speed"></strong>
       </p>
     </div>
        <div class="weather-app-temperature-container">
            <div class="icon" id="icon"></div>
            <div class="weather-app-temperature" id="temperature"></div>
            <div class="weather-app-unit">°C</div>
        </div>
     </div>
    </main>
     <footer>Built by <a href="https://github.com/Smitha-1202" target="_blank">Shamsmitha</a></footer>
     </div>
     <script src="index.js"></script>
    </body>
    </html>
